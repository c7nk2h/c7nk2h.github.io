baseURL = "https://c7nk2h.github.io/"
theme = "PaperMod"
languageCode = "de"
defaultContentLanguage = "de"
disableLanguagesToggle = true

hasCJKLanguage = false

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  enableSearch = true

[languages]
  [languages.de]
    languageName = "Deutsch"
    contentDir = "content/de"
    weight = 1
    [[languages.de.menu.main]]
      name = "Projekte"
      url = "projects/"
      weight = 10
    [[languages.de.menu.main]]
      name = "Blog"
      url = "posts/"
      weight = 20
    [[languages.de.menu.main]]
      name = "Über mich"
      url = "pages/about_me/"
      weight = 40
    [[languages.de.menu.main]]
      name = "Kontakt"
      url = "pages/contact/"
      weight = 50
    [[languages.de.menu.main]]
      name = "search"
      url = "search/"
      weight = 60

